[workspace]
name = "OBR"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "11.8"

[dependencies]
cuda-version = "11.8.*"
pytorch = { version = "2.4.1.*", build = "*cuda*" }
torchvision = { version = "*", build = "*cuda*" }
tqdm = "*"
albumentations = "*"
python = "3.11.*"
jupyterlab = "*"
ipykernel = "*"
pandas = "*"
numpy = "*"
matplotlib = "*"
opencv = "*"
ultralytics = "*"
evidently = "*"
scikit-learn = ">=1.8.0,<2"
scikit-image = ">=0.26.0,<0.27"
fiftyone = ">=1.4.1,<2"
strawberry-graphql = "<0.209.0"
pyprojroot = ">=0.3.0,<0.4"
gdown = ">=5.2.1,<6"
pip = ">=26.0.1,<27"

[tasks]
make_requirements = "python -m pip freeze > requirements.txt"
